<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f1a;
            color: white;
            overflow-x: hidden;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #6FCF97, #2F80ED);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6FCF97, #2F80ED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            backdrop-filter: blur(8px);
            overflow-y: auto;
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background: #1a1f2e;
            border-radius: 28px;
            max-width: 900px;
            margin: 2rem auto;
            animation: fadeUp 0.3s ease;
            width: 95%;
            border: 1px solid rgba(111,207,151,0.2);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-row {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            padding: 1rem 0;
            scrollbar-width: thin;
        }

        .content-row::-webkit-scrollbar {
            height: 5px;
        }

        .content-row::-webkit-scrollbar-thumb {
            background: #6FCF97;
            border-radius: 10px;
        }

        .video-thumbnail {
            position: relative;
            cursor: pointer;
            border-radius: 16px;
            overflow: hidden;
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
            backdrop-filter: blur(2px);
        }

        .video-thumbnail:hover .play-overlay {
            opacity: 1;
        }

        .star-rating {
            display: inline-flex;
            gap: 8px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .star-rating i {
            font-size: 1.6rem;
            transition: transform 0.1s ease;
        }

        .star-rating i:hover {
            transform: scale(1.15);
        }

        .star-active {
            color: #fbbf24;
            text-shadow: 0 0 4px rgba(251,191,36,0.5);
        }

        .star-inactive {
            color: #4b5563;
        }

        .detail-card {
            background: rgba(15, 25, 35, 0.7);
            border-radius: 20px;
            padding: 1.5rem;
        }

        .info-badge {
            background: rgba(111,207,151,0.15);
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            color: #6FCF97;
        }

        .toast {
            animation: slideUp 0.3s ease;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            background: #1f2937;
            color: white;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-left: 4px solid #6FCF97;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .filter-chip {
            border: 1px solid #374151;
            background: #111827;
            color: #d1d5db;
            padding: 8px 14px;
            border-radius: 9999px;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #6FCF97, #2F80ED);
            color: white;
            border-color: transparent;
        }

        .custom-player-shell {
            position: relative;
            width: 100%;
            background: #000;
            overflow: hidden;
        }

        .custom-player-video {
            width: 100%;
            display: block;
            background: #000;
            max-height: 80vh;
        }

        .custom-player-topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 14px;
            display: flex;
            justify-content: flex-end;
            background: linear-gradient(to bottom, rgba(0,0,0,0.75), rgba(0,0,0,0));
            z-index: 3;
        }

        .custom-player-controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.15));
            z-index: 3;
        }

        .control-btn {
            width: 42px;
            height: 42px;
            border-radius: 999px;
            border: none;
            color: white;
            background: rgba(255,255,255,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.22);
        }

        .progress-wrap {
            width: 100%;
            margin-bottom: 10px;
        }

        .progress-bar {
            width: 100%;
            appearance: none;
            height: 5px;
            border-radius: 999px;
            background: rgba(255,255,255,0.2);
            outline: none;
            cursor: pointer;
        }

        .progress-bar::-webkit-slider-thumb {
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #6FCF97;
            cursor: pointer;
        }

        .time-label {
            font-size: 0.9rem;
            color: #e5e7eb;
            min-width: 95px;
            text-align: center;
        }

        .player-center-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
            pointer-events: none;
        }

        .player-center-play button {
            pointer-events: auto;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 1.2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(4px);
        }

        .hidden-ui {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        video::-webkit-media-controls-download-button {
            display: none !important;
        }

        video::-webkit-media-controls-enclosure {
            overflow: hidden;
        }

        video::-webkit-media-controls-panel {
            width: calc(100% + 30px);
        }

        @media (max-width: 640px) {
            .modal-content {
                margin: 0;
                border-radius: 0;
                min-height: 100vh;
            }

            .star-rating i {
                font-size: 1.3rem;
            }

            .time-label {
                min-width: auto;
                font-size: 0.78rem;
            }
        }
    </style>
</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB_yOh7N1zVsGNhUQQwCyUUvjIgVdge_LQ",
            authDomain: "mtprime-51d91.firebaseapp.com",
            projectId: "mtprime-51d91",
            storageBucket: "mtprime-51d91.firebasestorage.app",
            messagingSenderId: "987560990642",
            appId: "1:987560990642:web:2bdda54b810d87a94f36ab"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let allMovies = [];
        let ratingsCache = {};
        let currentMovie = null;
        let currentViewCat = "movies";
        let viewAllPage = 1;
        let selectedGenreFilter = "all";
        const PAGE_SIZE = 12;

        let playerHideTimer = null;
        let isSeeking = false;

        function showToast(msg, type = "success") {
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2700);
        }

        function getWatchlist() {
            return JSON.parse(localStorage.getItem("mtprime_watchlist") || "[]");
        }

        function setWatchlist(list) {
            localStorage.setItem("mtprime_watchlist", JSON.stringify(list));
        }

        function safeGenres() {
            const genres = [...new Set(allMovies.map(m => (m.genre || "").trim()).filter(Boolean))];
            return genres.sort((a, b) => a.localeCompare(b));
        }

        async function loadMovies() {
            const snap = await db.collection("films")
                .where("approval_status", "==", "approved")
                .get();

            allMovies = snap.docs.map(doc => {
                const data = doc.data() || {};
                return {
                    id: doc.id,
                    title: data.title || "Untitled",
                    genre: data.genre || "Unknown",
                    release_year: data.release_year || "",
                    duration: data.duration || "N/A",
                    language: data.language || "Unknown",
                    description: data.description || "No description available",
                    thumbnail_url: data.thumbnail_url || "https://placehold.co/300x400?text=No+Poster",
                    video_url: data.video_url || "",
                    uploader_name: data.uploader_name || "Unknown",
                    views: 0
                };
            }).filter(movie => movie.video_url);

            await loadRatings();
            await loadViews();

            if (allMovies.length) setCurrentMovie(allMovies[0]);
            buildGenreFilters();
            renderAllRows();
        }

        async function loadViews() {
            const snap = await db.collection("movie_views").get();
            const viewMap = {};
            snap.forEach(doc => {
                const d = doc.data() || {};
                if (!d.movie_id) return;
                viewMap[d.movie_id] = (viewMap[d.movie_id] || 0) + 1;
            });
            allMovies = allMovies.map(m => ({ ...m, views: viewMap[m.id] || 0 }));
        }

        async function loadRatings() {
            const snap = await db.collection("movie_ratings").get();
            const map = {};

            snap.forEach(doc => {
                const d = doc.data() || {};
                const mid = d.movie_id;
                const rating = Number(d.rating);

                if (!mid || !Number.isFinite(rating)) return;

                if (!map[mid]) {
                    map[mid] = { total: 0, count: 0, userRating: null };
                }

                map[mid].total += rating;
                map[mid].count += 1;

                if (currentUser && d.user_email === currentUser.email) {
                    map[mid].userRating = rating;
                }
            });

            Object.keys(map).forEach(id => {
                map[id].avg = map[id].count ? (map[id].total / map[id].count).toFixed(1) : "0.0";
            });

            ratingsCache = map;
        }

        async function submitRating(movieId, ratingValue) {
            if (!currentUser) {
                showToast("Please login to rate", "error");
                return;
            }

            const movie = allMovies.find(m => m.id === movieId);
            if (!movie) return;

            try {
                const existing = await db.collection("movie_ratings")
                    .where("movie_id", "==", movieId)
                    .where("user_email", "==", currentUser.email)
                    .get();

                const batch = db.batch();
                existing.forEach(doc => batch.delete(doc.ref));

                const newRef = db.collection("movie_ratings").doc();
                batch.set(newRef, {
                    movie_id: movieId,
                    movie_title: movie.title,
                    user_email: currentUser.email,
                    rating: ratingValue,
                    created_at: firebase.firestore.FieldValue.serverTimestamp()
                });

                await batch.commit();
                await loadRatings();

                if (currentMovie && currentMovie.id === movieId) {
                    renderStarWidget();
                }

                renderAllRows();
                renderViewAll();
                showToast(`You rated ${ratingValue} ★`, "success");
            } catch (err) {
                console.error(err);
                showToast("Rating failed", "error");
            }
        }

        function renderStarWidget() {
            const container = document.getElementById("starRatingComponent");
            if (!container || !currentMovie) return;

            const info = ratingsCache[currentMovie.id] || { avg: "0.0", count: 0, userRating: null };
            document.getElementById("detailAvgRating").innerHTML = `★ ${info.avg}`;
            document.getElementById("detailRatingCount").innerHTML = `(${info.count} ratings)`;

            const userRating = info.userRating || 0;
            container.innerHTML = "";

            for (let i = 1; i <= 5; i++) {
                const star = document.createElement("i");
                star.className = i <= userRating ? "fas fa-star star-active" : "far fa-star star-inactive";
                star.style.fontSize = "1.8rem";
                star.style.cursor = "pointer";
                star.addEventListener("click", (e) => {
                    e.stopPropagation();
                    submitRating(currentMovie.id, i);
                });
                container.appendChild(star);
            }
        }

        function setCurrentMovie(movie) {
            currentMovie = movie;

            document.getElementById("heroTitle").innerText = movie.title || "Untitled";
            document.getElementById("heroDesc").innerText = movie.description || "No description available";

            const heroVid = document.getElementById("heroVideo");
            if (movie.video_url) {
                heroVid.innerHTML = `<source src="${movie.video_url}" type="video/mp4">`;
                heroVid.load();
            }

            document.getElementById("detailTitle").innerText = movie.title || "—";
            document.getElementById("detailYear").innerText = movie.release_year || "—";
            document.getElementById("detailProducer").innerText = movie.uploader_name || "Unknown";
            document.getElementById("detailGenre").innerText = movie.genre || "—";
            document.getElementById("detailDuration").innerText = movie.duration || "—";
            document.getElementById("detailLanguage").innerText = movie.language || "Unknown";
            document.getElementById("detailDescription").innerText = movie.description || "No description";
            document.getElementById("detailPoster").src = movie.thumbnail_url || "https://placehold.co/400x500?text=No+Poster";

            renderStarWidget();

            const watchlist = getWatchlist();
            const isInList = watchlist.some(w => w.id === movie.id);
            const listIcon = document.getElementById("listIcon");
            const listBtnText = document.getElementById("listBtnText");

            if (isInList) {
                listIcon.className = "fas fa-check";
                listBtnText.innerText = "In My List";
            } else {
                listIcon.className = "fas fa-plus";
                listBtnText.innerText = "Add to My List";
            }
        }

        function toggleWatchlist(movie) {
            let list = getWatchlist();
            const exists = list.find(m => m.id === movie.id);

            if (exists) {
                list = list.filter(m => m.id !== movie.id);
                showToast(`Removed "${movie.title}" from list`, "info");
            } else {
                list.push({
                    id: movie.id,
                    title: movie.title,
                    thumbnail: movie.thumbnail_url,
                    video: movie.video_url,
                    genre: movie.genre,
                    year: movie.release_year
                });
                showToast(`Added "${movie.title}" to My List`, "success");
            }

            setWatchlist(list);
            renderAllRows();

            if (currentMovie && currentMovie.id === movie.id) {
                const inListNow = list.some(w => w.id === movie.id);
                document.getElementById("listIcon").className = inListNow ? "fas fa-check" : "fas fa-plus";
                document.getElementById("listBtnText").innerText = inListNow ? "In My List" : "Add to My List";
            }
        }

        function formatTime(seconds) {
            if (!Number.isFinite(seconds)) return "00:00";
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
        }

        function updatePlayerTimeUI() {
            const player = document.getElementById("mainPlayer");
            const progressBar = document.getElementById("progressBar");
            const timeLabel = document.getElementById("timeLabel");

            const duration = player.duration || 0;
            const currentTime = player.currentTime || 0;

            if (!isSeeking && duration > 0) {
                progressBar.value = (currentTime / duration) * 100;
            }

            timeLabel.textContent = `${formatTime(currentTime)} / ${formatTime(duration)}`;
        }

        function updatePlayPauseIcon() {
            const player = document.getElementById("mainPlayer");
            const btn = document.getElementById("playPauseBtn");
            const center = document.getElementById("playerCenterPlay");

            btn.innerHTML = player.paused
                ? '<i class="fas fa-play"></i>'
                : '<i class="fas fa-pause"></i>';

            center.classList.toggle("hidden", !player.paused);
        }

        function updateMuteIcon() {
            const player = document.getElementById("mainPlayer");
            const btn = document.getElementById("muteBtn");

            if (player.muted || player.volume === 0) {
                btn.innerHTML = '<i class="fas fa-volume-mute"></i>';
            } else {
                btn.innerHTML = '<i class="fas fa-volume-up"></i>';
            }
        }

        function showPlayerUI() {
            document.getElementById("playerTopbar").classList.remove("hidden-ui");
            document.getElementById("playerControls").classList.remove("hidden-ui");

            clearTimeout(playerHideTimer);
            playerHideTimer = setTimeout(() => {
                const player = document.getElementById("mainPlayer");
                if (!player.paused) {
                    document.getElementById("playerTopbar").classList.add("hidden-ui");
                    document.getElementById("playerControls").classList.add("hidden-ui");
                }
            }, 2500);
        }

        function attachPlayerEvents() {
            const player = document.getElementById("mainPlayer");
            const shell = document.getElementById("playerShell");
            const progressBar = document.getElementById("progressBar");

            player.addEventListener("timeupdate", updatePlayerTimeUI);
            player.addEventListener("loadedmetadata", updatePlayerTimeUI);
            player.addEventListener("play", () => {
                updatePlayPauseIcon();
                showPlayerUI();
            });
            player.addEventListener("pause", () => {
                updatePlayPauseIcon();
                showPlayerUI();
            });
            player.addEventListener("volumechange", updateMuteIcon);
            player.addEventListener("click", togglePlayPause);

            shell.addEventListener("mousemove", showPlayerUI);
            shell.addEventListener("touchstart", showPlayerUI);

            shell.addEventListener("contextmenu", (e) => e.preventDefault());

            progressBar.addEventListener("input", () => {
                isSeeking = true;
                const duration = player.duration || 0;
                player.currentTime = (progressBar.value / 100) * duration;
            });

            progressBar.addEventListener("change", () => {
                isSeeking = false;
            });
        }

        function togglePlayPause() {
            const player = document.getElementById("mainPlayer");
            if (player.paused) {
                player.play().catch(() => {});
            } else {
                player.pause();
            }
        }

        function toggleMute() {
            const player = document.getElementById("mainPlayer");
            player.muted = !player.muted;
            updateMuteIcon();
        }

        function seekBy(seconds) {
            const player = document.getElementById("mainPlayer");
            const duration = player.duration || 0;
            let nextTime = (player.currentTime || 0) + seconds;
            if (nextTime < 0) nextTime = 0;
            if (nextTime > duration) nextTime = duration;
            player.currentTime = nextTime;
        }

        function toggleFullscreen() {
            const shell = document.getElementById("playerShell");
            if (!document.fullscreenElement) {
                shell.requestFullscreen?.();
            } else {
                document.exitFullscreen?.();
            }
        }

        function playMovie(movie) {
            const player = document.getElementById("mainPlayer");
            const source = document.getElementById("playerSource");

            source.src = movie.video_url || "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4";
            player.load();
            document.getElementById("playerModal").classList.add("show");
            showPlayerUI();

            player.play().catch(() => {});
            updatePlayPauseIcon();
            updateMuteIcon();

            db.collection("movie_views").add({
                movie_id: movie.id,
                movie_title: movie.title,
                user_email: currentUser?.email || null,
                viewed_at: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(console.error);
        }

        function closePlayerModal() {
            const player = document.getElementById("mainPlayer");
            player.pause();
            document.getElementById("playerModal").classList.remove("show");
        }

        function createCard(movie) {
            const div = document.createElement("div");
            div.className = "flex-shrink-0 w-44 md:w-52 cursor-pointer video-thumbnail rounded-xl";
            const ratingInfo = ratingsCache[movie.id] || { avg: "0.0" };

            div.innerHTML = `
                <div class="relative h-64 rounded-xl overflow-hidden bg-gray-800">
                    <img class="w-full h-full object-cover" src="${movie.thumbnail_url || 'https://placehold.co/300x400'}" alt="${movie.title}">
                    <div class="play-overlay">
                        <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center">
                            <i class="fas fa-play text-white text-xl"></i>
                        </div>
                    </div>
                    <div class="absolute top-2 right-2 bg-black/60 px-2 py-0.5 rounded-full text-xs">★ ${ratingInfo.avg}</div>
                </div>
                <div class="mt-2">
                    <h4 class="font-semibold truncate">${movie.title}</h4>
                    <p class="text-xs text-gray-400">${movie.genre || 'Movie'} • ${movie.release_year || ''}</p>
                </div>
            `;

            div.addEventListener("click", () => {
                setCurrentMovie(movie);
                document.getElementById("detailsModal").classList.add("show");
            });

            return div;
        }

        function renderAllRows() {
            const watchlistIds = new Set(getWatchlist().map(w => w.id));
            const mylistMovies = allMovies.filter(m => watchlistIds.has(m.id)).slice(0, 10);
            const trending = [...allMovies].sort((a,b) => (b.views || 0) - (a.views || 0)).slice(0, 10);
            const topRated = [...allMovies].sort((a,b) => parseFloat(ratingsCache[b.id]?.avg || 0) - parseFloat(ratingsCache[a.id]?.avg || 0)).slice(0, 10);

            document.getElementById("mylistRow").innerHTML = "";
            document.getElementById("trendingRow").innerHTML = "";
            document.getElementById("topRatedRow").innerHTML = "";

            mylistMovies.forEach(m => document.getElementById("mylistRow").appendChild(createCard(m)));
            trending.forEach(m => document.getElementById("trendingRow").appendChild(createCard(m)));
            topRated.forEach(m => document.getElementById("topRatedRow").appendChild(createCard(m)));
        }

        function buildGenreFilters() {
            const bar = document.getElementById("genreFilterBar");
            const genres = safeGenres();

            bar.innerHTML = "";

            const allBtn = document.createElement("button");
            allBtn.className = "filter-chip active";
            allBtn.innerText = "All";
            allBtn.dataset.genre = "all";
            allBtn.addEventListener("click", () => setGenreFilter("all"));
            bar.appendChild(allBtn);

            genres.forEach(genre => {
                const btn = document.createElement("button");
                btn.className = "filter-chip";
                btn.innerText = genre;
                btn.dataset.genre = genre;
                btn.addEventListener("click", () => setGenreFilter(genre));
                bar.appendChild(btn);
            });
        }

        function setGenreFilter(genre) {
            selectedGenreFilter = genre;
            document.querySelectorAll("#genreFilterBar .filter-chip").forEach(btn => {
                btn.classList.toggle("active", btn.dataset.genre === genre);
            });
            viewAllPage = 1;
            renderViewAll();
        }

        function getViewAllItems() {
            let items = [];

            if (currentViewCat === "movies") {
                items = [...allMovies];
            } else if (currentViewCat === "mylist") {
                const ids = new Set(getWatchlist().map(w => w.id));
                items = allMovies.filter(m => ids.has(m.id));
            } else if (currentViewCat === "trending") {
                items = [...allMovies].sort((a,b) => (b.views || 0) - (a.views || 0));
            } else if (currentViewCat === "toprated") {
                items = [...allMovies].sort((a,b) => parseFloat(ratingsCache[b.id]?.avg || 0) - parseFloat(ratingsCache[a.id]?.avg || 0));
            }

            return items;
        }

        function renderViewAll() {
            let items = getViewAllItems();
            const searchTerm = document.getElementById("viewAllSearch").value.toLowerCase().trim();

            if (selectedGenreFilter !== "all") {
                items = items.filter(m => (m.genre || "").toLowerCase() === selectedGenreFilter.toLowerCase());
            }

            let filtered = items.filter(m => {
                const title = (m.title || "").toLowerCase();
                const genre = (m.genre || "").toLowerCase();
                const producer = (m.uploader_name || "").toLowerCase();
                return title.includes(searchTerm) || genre.includes(searchTerm) || producer.includes(searchTerm);
            });

            const end = viewAllPage * PAGE_SIZE;
            const paginated = filtered.slice(0, end);

            const grid = document.getElementById("viewAllGrid");
            grid.innerHTML = "";
            paginated.forEach(m => grid.appendChild(createCard(m)));

            document.getElementById("loadMoreBtn").style.display = end >= filtered.length ? "none" : "inline-block";
        }

        function openViewAll(cat) {
            currentViewCat = cat;
            viewAllPage = 1;
            selectedGenreFilter = "all";

            const titles = {
                movies: "All Movies",
                mylist: "My List",
                trending: "Trending Now",
                toprated: "Top Rated"
            };

            document.getElementById("viewAllTitle").innerText = titles[cat] || "Content";
            document.getElementById("viewAllSearch").value = "";
            buildGenreFilters();
            renderViewAll();
            document.getElementById("viewAllModal").classList.add("show");
        }

        function checkAuth() {
            const userStr = localStorage.getItem("mtprime_user");
            if (!userStr) {
                window.location.href = "index.html";
                return;
            }

            currentUser = JSON.parse(userStr);

            const displayName = currentUser.name || currentUser.displayName || "User";
            const email = currentUser.email || "";

            document.getElementById("profileInitial").innerText = displayName.charAt(0).toUpperCase();
            document.getElementById("userName").innerText = displayName;
            document.getElementById("userEmailMini").innerText = email;
            document.getElementById("dropdownUserName").innerText = displayName;
            document.getElementById("dropdownUserEmail").innerText = email;

            document.getElementById("mobileProfileInitial").innerText = displayName.charAt(0).toUpperCase();
            document.getElementById("mobileUserName").innerText = displayName;
            document.getElementById("mobileUserEmail").innerText = email;

            loadMovies().catch(console.error);
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        document.getElementById("profileBtn")?.addEventListener("click", () => {
            document.getElementById("profileDropdown").classList.toggle("hidden");
        });

        document.getElementById("logoutBtn")?.addEventListener("click", logout);
        document.getElementById("mobileLogoutBtn")?.addEventListener("click", logout);

        document.getElementById("heroPlayBtn")?.addEventListener("click", () => {
            if (currentMovie) playMovie(currentMovie);
        });

        document.getElementById("heroDetailsBtn")?.addEventListener("click", () => {
            if (currentMovie) {
                setCurrentMovie(currentMovie);
                document.getElementById("detailsModal").classList.add("show");
            }
        });

        document.getElementById("detailPlayBtn")?.addEventListener("click", () => {
            if (currentMovie) {
                document.getElementById("detailsModal").classList.remove("show");
                playMovie(currentMovie);
            }
        });

        document.getElementById("detailAddToListBtn")?.addEventListener("click", () => {
            if (currentMovie) toggleWatchlist(currentMovie);
        });

        document.getElementById("closeDetailModal")?.addEventListener("click", () => {
            document.getElementById("detailsModal").classList.remove("show");
        });

        document.getElementById("closePlayer")?.addEventListener("click", closePlayerModal);
        document.getElementById("playPauseBtn")?.addEventListener("click", togglePlayPause);
        document.getElementById("centerPlayBtn")?.addEventListener("click", togglePlayPause);
        document.getElementById("muteBtn")?.addEventListener("click", toggleMute);
        document.getElementById("backwardBtn")?.addEventListener("click", () => seekBy(-10));
        document.getElementById("forwardBtn")?.addEventListener("click", () => seekBy(10));
        document.getElementById("fullscreenBtn")?.addEventListener("click", toggleFullscreen);

        document.getElementById("searchToggle")?.addEventListener("click", () => {
            document.getElementById("searchOverlay").classList.remove("hidden");
        });

        document.getElementById("closeSearch")?.addEventListener("click", () => {
            document.getElementById("searchOverlay").classList.add("hidden");
        });

        document.getElementById("searchInput")?.addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase().trim();
            const res = allMovies.filter(m =>
                (m.title || "").toLowerCase().includes(q) ||
                (m.genre || "").toLowerCase().includes(q) ||
                (m.uploader_name || "").toLowerCase().includes(q)
            );

            document.getElementById("searchResults").innerHTML = res.map(m => `
                <div class="search-result bg-gray-800/70 p-3 rounded-xl cursor-pointer hover:bg-gray-700 transition">
                    <div class="font-semibold">${m.title}</div>
                    <div class="text-sm text-gray-400">${m.genre} • ${m.release_year} • ${m.uploader_name || "Unknown"}</div>
                </div>
            `).join("");

            document.querySelectorAll(".search-result").forEach((el, idx) => {
                el.addEventListener("click", () => {
                    setCurrentMovie(res[idx]);
                    document.getElementById("searchOverlay").classList.add("hidden");
                    document.getElementById("detailsModal").classList.add("show");
                });
            });
        });

        document.querySelectorAll(".nav-show-viewall").forEach(btn => {
            btn.addEventListener("click", () => {
                openViewAll(btn.dataset.category);
                if (!document.getElementById("mobileMenu").classList.contains("translate-x-full")) {
                    toggleMobileMenu();
                }
            });
        });

        document.getElementById("closeViewAll")?.addEventListener("click", () => {
            document.getElementById("viewAllModal").classList.remove("show");
        });

        document.getElementById("viewAllSearch")?.addEventListener("input", () => {
            viewAllPage = 1;
            renderViewAll();
        });

        document.getElementById("loadMoreBtn")?.addEventListener("click", () => {
            viewAllPage++;
            renderViewAll();
        });

        const menuToggle = document.getElementById("menuToggle");
        const mobileMenu = document.getElementById("mobileMenu");
        const backdrop = document.getElementById("mobileBackdrop");

        function toggleMobileMenu() {
            mobileMenu.classList.toggle("translate-x-full");
            backdrop.classList.toggle("hidden");
        }

        menuToggle?.addEventListener("click", toggleMobileMenu);
        document.getElementById("closeMobileBtn")?.addEventListener("click", toggleMobileMenu);
        backdrop?.addEventListener("click", toggleMobileMenu);

        window.addEventListener("click", (e) => {
            if (e.target === document.getElementById("detailsModal")) {
                document.getElementById("detailsModal").classList.remove("show");
            }
            if (e.target === document.getElementById("playerModal")) {
                closePlayerModal();
            }
            if (e.target === document.getElementById("viewAllModal")) {
                document.getElementById("viewAllModal").classList.remove("show");
            }
        });

        document.addEventListener("keydown", (e) => {
            const playerModalOpen = document.getElementById("playerModal").classList.contains("show");
            if (!playerModalOpen) return;

            if (e.code === "Space") {
                e.preventDefault();
                togglePlayPause();
            } else if (e.code === "ArrowRight") {
                seekBy(10);
            } else if (e.code === "ArrowLeft") {
                seekBy(-10);
            } else if (e.code === "KeyM") {
                toggleMute();
            } else if (e.code === "Escape") {
                closePlayerModal();
            }
        });

        attachPlayerEvents();
        checkAuth();
    </script>
</body>
</html>
