<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

    <style>
        * { box-sizing: border-box; user-select: none; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0f0f1a;
            color: white;
            overflow-x: hidden;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #6FCF97, #2F80ED);
        }

        .gradient-text {
            background: linear-gradient(135deg, #6FCF97, #2F80ED);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-6px);
            box-shadow: 0 20px 30px rgba(0,0,0,0.4);
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.92);
            z-index: 1000;
            backdrop-filter: blur(10px);
            overflow-y: auto;
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background: #1a1f2e;
            border-radius: 28px;
            max-width: 950px;
            margin: 2rem auto;
            animation: fadeUp 0.3s ease;
            width: 95%;
            border: 1px solid rgba(111,207,151,0.25);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .content-row {
            display: flex;
            overflow-x: auto;
            gap: 1.2rem;
            padding: 1rem 0;
            scrollbar-width: thin;
            scroll-behavior: smooth;
        }

        .content-row::-webkit-scrollbar {
            height: 5px;
        }

        .content-row::-webkit-scrollbar-thumb {
            background: #6FCF97;
            border-radius: 10px;
        }

        .video-thumbnail {
            position: relative;
            cursor: pointer;
            border-radius: 18px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .video-thumbnail:hover {
            transform: scale(1.02);
        }

        .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.25s;
            backdrop-filter: blur(3px);
        }

        .video-thumbnail:hover .play-overlay {
            opacity: 1;
        }

        .star-rating {
            display: inline-flex;
            gap: 8px;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            padding: 6px 14px;
            border-radius: 50px;
            backdrop-filter: blur(4px);
        }

        .star-rating i {
            font-size: 1.7rem;
            transition: transform 0.1s ease;
        }

        .star-rating i:hover {
            transform: scale(1.15);
        }

        .star-active {
            color: #fbbf24;
            text-shadow: 0 0 5px rgba(251,191,36,0.6);
        }

        .star-inactive {
            color: #6b7280;
        }

        .toast {
            animation: slideUp 0.3s ease;
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3000;
            background: #1f2937;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 500;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            border-left: 4px solid #6FCF97;
            backdrop-filter: blur(8px);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateX(-50%) translateY(20px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        .filter-chip {
            border: 1px solid #374151;
            background: #111827;
            color: #d1d5db;
            padding: 8px 16px;
            border-radius: 9999px;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .filter-chip.active {
            background: linear-gradient(135deg, #6FCF97, #2F80ED);
            color: white;
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(47,128,237,0.3);
        }

        .custom-player-shell {
            position: relative;
            width: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
        }

        .custom-player-video {
            width: 100%;
            height: auto;
            display: block;
            background: #000;
            cursor: pointer;
            object-fit: contain;
            max-height: 85vh;
        }

        .custom-player-shell:fullscreen {
            width: 100vw;
            height: 100vh;
            background: black;
        }

        .custom-player-shell:fullscreen .custom-player-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 100vh;
        }

        .custom-player-topbar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 18px 24px;
            display: flex;
            justify-content: flex-end;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0));
            z-index: 30;
            transition: opacity 0.25s ease;
        }

        .custom-player-controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            padding: 20px 24px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), rgba(0,0,0,0.2));
            z-index: 30;
            transition: opacity 0.25s ease;
        }

        .control-btn {
            width: 44px;
            height: 44px;
            border-radius: 999px;
            border: none;
            color: white;
            background: rgba(30,30,45,0.85);
            backdrop-filter: blur(6px);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .control-btn:hover {
            background: rgba(111,207,151,0.7);
            transform: scale(1.02);
        }

        .progress-wrap {
            width: 100%;
            margin-bottom: 14px;
        }

        .progress-bar {
            width: 100%;
            appearance: none;
            height: 6px;
            border-radius: 10px;
            background: rgba(255,255,255,0.3);
            outline: none;
            cursor: pointer;
        }

        .progress-bar::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #6FCF97;
            cursor: pointer;
            box-shadow: 0 0 5px #6FCF97;
        }

        .time-label {
            font-size: 0.9rem;
            font-family: monospace;
            letter-spacing: 0.5px;
            color: #f0f0f0;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 30px;
        }

        .player-center-play {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 20;
            pointer-events: none;
        }

        .player-center-play button {
            pointer-events: auto;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            transition: 0.2s;
        }

        .player-center-play button:hover {
            background: #6FCF97;
            transform: scale(1.05);
        }

        .hidden-ui {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s;
        }

        @media (max-width: 768px) {
            .control-btn {
                width: 38px;
                height: 38px;
            }

            .custom-player-controls {
                padding: 12px 16px;
            }

            .time-label {
                font-size: 0.75rem;
            }
        }

        .detail-card {
            background: rgba(15, 25, 35, 0.6);
            border-radius: 20px;
        }
    </style>
</head>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB_yOh7N1zVsGNhUQQwCyUUvjIgVdge_LQ",
            authDomain: "mtprime-51d91.firebaseapp.com",
            projectId: "mtprime-51d91",
            storageBucket: "mtprime-51d91.firebasestorage.app",
            messagingSenderId: "987560990642",
            appId: "1:987560990642:web:2bdda54b810d87a94f36ab"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null,
            allMovies = [],
            ratingsCache = {},
            currentMovie = null,
            currentViewCat = "movies",
            viewAllPage = 1,
            selectedGenreFilter = "all",
            PAGE_SIZE = 12,
            playerHideTimer = null,
            isSeeking = false,
            isPlayingIntro = false,
            queuedMovie = null;

        const INTRO_VIDEO_URL = "intro.mp4";

        function showToast(msg, type = "success") {
            const t = document.createElement("div");
            t.className = "toast";
            t.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'} mr-2"></i>${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2500);
        }

        function getWatchlist() {
            return JSON.parse(localStorage.getItem("mtprime_watchlist") || "[]");
        }

        function setWatchlist(list) {
            localStorage.setItem("mtprime_watchlist", JSON.stringify(list));
        }

        async function loadMovies() {
            const snap = await db.collection("films").where("approval_status", "==", "approved").get();

            allMovies = snap.docs.map(doc => {
                const d = doc.data();
                return {
                    id: doc.id,
                    title: d.title || "Untitled",
                    genre: d.genre || "Unknown",
                    release_year: d.release_year || "",
                    duration: d.duration || "N/A",
                    language: d.language || "Unknown",
                    description: d.description || "No description",
                    thumbnail_url: d.thumbnail_url || "https://placehold.co/300x400",
                    video_url: d.video_url || "",
                    uploader_name: d.uploader_name || "Unknown",
                    views: 0
                };
            }).filter(m => m.video_url);

            const viewsSnap = await db.collection("movie_views").get();
            const vm = {};
            viewsSnap.forEach(d => {
                const vd = d.data();
                if (vd.movie_id) vm[vd.movie_id] = (vm[vd.movie_id] || 0) + 1;
            });

            allMovies = allMovies.map(m => ({ ...m, views: vm[m.id] || 0 }));

            const ratingsSnap = await db.collection("movie_ratings").get();
            ratingsCache = {};

            ratingsSnap.forEach(doc => {
                const rd = doc.data();
                const mid = rd.movie_id;
                const rat = Number(rd.rating);

                if (mid && rat) {
                    if (!ratingsCache[mid]) ratingsCache[mid] = { total: 0, count: 0, userRating: null };
                    ratingsCache[mid].total += rat;
                    ratingsCache[mid].count += 1;
                    if (currentUser && rd.user_email === currentUser.email) ratingsCache[mid].userRating = rat;
                }
            });

            Object.keys(ratingsCache).forEach(id => {
                ratingsCache[id].avg = ratingsCache[id].count ? (ratingsCache[id].total / ratingsCache[id].count).toFixed(1) : "0.0";
            });

            if (allMovies.length) setCurrentMovie(allMovies[0]);
            renderAllRows();
            buildGenreFilters();
        }

        async function submitRating(movieId, val) {
            if (!currentUser) {
                showToast("Login to rate", "error");
                return;
            }

            const movie = allMovies.find(m => m.id === movieId);
            if (!movie) return;

            const existing = await db.collection("movie_ratings")
                .where("movie_id", "==", movieId)
                .where("user_email", "==", currentUser.email)
                .get();

            const batch = db.batch();
            existing.forEach(d => batch.delete(d.ref));

            batch.set(db.collection("movie_ratings").doc(), {
                movie_id: movieId,
                movie_title: movie.title,
                user_email: currentUser.email,
                rating: val,
                created_at: firebase.firestore.FieldValue.serverTimestamp()
            });

            await batch.commit();
            await loadMovies();

            if (currentMovie && currentMovie.id === movieId) renderStarWidget();
            renderAllRows();
            renderViewAll();
            showToast(`Rated ${val} ★`, "success");
        }

        function renderStarWidget() {
            if (!currentMovie) return;

            const info = ratingsCache[currentMovie.id] || { avg: "0.0", count: 0, userRating: null };
            document.getElementById("detailAvgRating").innerHTML = `★ ${info.avg}`;
            document.getElementById("detailRatingCount").innerHTML = `(${info.count} ratings)`;

            const container = document.getElementById("starRatingComponent");
            if (!container) return;

            const userRating = info.userRating || 0;
            container.innerHTML = "";

            for (let i = 1; i <= 5; i++) {
                const star = document.createElement("i");
                star.className = i <= userRating ? "fas fa-star star-active" : "far fa-star star-inactive";
                star.style.fontSize = "1.8rem";
                star.style.cursor = "pointer";
                star.addEventListener("click", (e) => {
                    e.stopPropagation();
                    submitRating(currentMovie.id, i);
                });
                container.appendChild(star);
            }
        }

        function setCurrentMovie(movie) {
            currentMovie = movie;

            document.getElementById("heroTitle").innerText = movie.title;
            document.getElementById("heroDesc").innerText = movie.description;

            const heroVid = document.getElementById("heroVideo");
            if (movie.video_url) {
                heroVid.innerHTML = `<source src="${movie.video_url}" type="video/mp4">`;
                heroVid.load();
            }

            document.getElementById("detailTitle").innerText = movie.title;
            document.getElementById("detailYear").innerText = movie.release_year || "—";
            document.getElementById("detailProducer").innerText = movie.uploader_name;
            document.getElementById("detailGenre").innerText = movie.genre;
            document.getElementById("detailDuration").innerText = movie.duration;
            document.getElementById("detailLanguage").innerText = movie.language;
            document.getElementById("detailDescription").innerText = movie.description;
            document.getElementById("detailPoster").src = movie.thumbnail_url;

            renderStarWidget();

            const inList = getWatchlist().some(w => w.id === movie.id);
            document.getElementById("listIcon").className = inList ? "fas fa-check" : "fas fa-plus";
            document.getElementById("listBtnText").innerText = inList ? "In My List" : "Add to My List";
        }

        function toggleWatchlist(movie) {
            let list = getWatchlist();
            const exists = list.find(m => m.id === movie.id);

            if (exists) {
                list = list.filter(m => m.id !== movie.id);
                showToast(`Removed "${movie.title}"`, "info");
            } else {
                list.push({
                    id: movie.id,
                    title: movie.title,
                    thumbnail: movie.thumbnail_url,
                    video: movie.video_url,
                    genre: movie.genre,
                    year: movie.release_year
                });
                showToast(`Added "${movie.title}"`, "success");
            }

            setWatchlist(list);
            renderAllRows();

            if (currentMovie && currentMovie.id === movie.id) {
                const nowIn = list.some(w => w.id === movie.id);
                document.getElementById("listIcon").className = nowIn ? "fas fa-check" : "fas fa-plus";
                document.getElementById("listBtnText").innerText = nowIn ? "In My List" : "Add to My List";
            }
        }

        function formatTime(sec) {
            if (!isFinite(sec)) return "00:00";
            const m = Math.floor(sec / 60);
            const s = Math.floor(sec % 60);
            return `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        }

        function updatePlayerUI() {
            const p = document.getElementById("mainPlayer"),
                  pb = document.getElementById("progressBar"),
                  tl = document.getElementById("timeLabel");

            if (!p) return;

            const dur = p.duration || 0;
            const cur = p.currentTime || 0;

            if (!isSeeking && dur > 0) {
                pb.value = (cur / dur) * 100;
            } else if (!dur) {
                pb.value = 0;
            }

            tl.textContent = `${formatTime(cur)} / ${formatTime(dur)}`;
        }

        function updatePlayPauseIcon() {
            const p = document.getElementById("mainPlayer");
            const btn = document.getElementById("playPauseBtn");
            const center = document.getElementById("playerCenterPlay");

            if (p) {
                btn.innerHTML = p.paused ? '<i class="fas fa-play"></i>' : '<i class="fas fa-pause"></i>';
                if (center) center.classList.toggle("hidden", !p.paused);
            }
        }

        function togglePlayPause() {
            const p = document.getElementById("mainPlayer");
            if (p.paused) p.play().catch(() => {});
            else p.pause();

            updatePlayPauseIcon();
            showPlayerUI();
        }

        function toggleMute() {
            const p = document.getElementById("mainPlayer");
            p.muted = !p.muted;
            document.getElementById("muteBtn").innerHTML = p.muted
                ? '<i class="fas fa-volume-mute"></i>'
                : '<i class="fas fa-volume-up"></i>';
        }

        function seekBy(sec) {
            const p = document.getElementById("mainPlayer");
            if (p.duration) {
                let nt = (p.currentTime || 0) + sec;
                if (nt < 0) nt = 0;
                if (nt > p.duration) nt = p.duration;
                p.currentTime = nt;
            }
        }

        function toggleFullscreen() {
            const shell = document.getElementById("playerShell");
            if (!document.fullscreenElement) shell.requestFullscreen?.();
            else document.exitFullscreen?.();
        }

        function showPlayerUI() {
            const top = document.getElementById("playerTopbar");
            const ctrl = document.getElementById("playerControls");

            if (top && ctrl) {
                top.classList.remove("hidden-ui");
                ctrl.classList.remove("hidden-ui");
                clearTimeout(playerHideTimer);

                const p = document.getElementById("mainPlayer");
                if (p && !p.paused) {
                    playerHideTimer = setTimeout(() => {
                        top.classList.add("hidden-ui");
                        ctrl.classList.add("hidden-ui");
                    }, 2800);
                }
            }
        }

        function startMainMovieAfterIntro() {
            const player = document.getElementById("mainPlayer");
            const src = document.getElementById("playerSource");

            if (!queuedMovie) return;

            isPlayingIntro = false;
            src.src = queuedMovie.video_url;
            player.load();

            player.play().then(() => {
                updatePlayPauseIcon();
                showPlayerUI();
            }).catch(() => {});

            db.collection("movie_views").add({
                movie_id: queuedMovie.id,
                movie_title: queuedMovie.title,
                user_email: currentUser?.email || null,
                viewed_at: firebase.firestore.FieldValue.serverTimestamp()
            }).catch(console.error);
        }

        function attachPlayerEvents() {
            const p = document.getElementById("mainPlayer");
            const pb = document.getElementById("progressBar");

            p.addEventListener("timeupdate", updatePlayerUI);
            p.addEventListener("loadedmetadata", updatePlayerUI);

            p.addEventListener("play", () => {
                updatePlayPauseIcon();
                showPlayerUI();
            });

            p.addEventListener("pause", () => {
                updatePlayPauseIcon();
                showPlayerUI();
            });

            p.addEventListener("volumechange", () => {
                document.getElementById("muteBtn").innerHTML = p.muted
                    ? '<i class="fas fa-volume-mute"></i>'
                    : '<i class="fas fa-volume-up"></i>';
            });

            p.addEventListener("ended", () => {
                if (isPlayingIntro && queuedMovie) {
                    startMainMovieAfterIntro();
                    return;
                }
                updatePlayPauseIcon();
                showPlayerUI();
            });

            p.addEventListener("click", togglePlayPause);

            document.getElementById("playerShell").addEventListener("mousemove", showPlayerUI);
            document.getElementById("playerShell").addEventListener("touchstart", showPlayerUI);

            pb.addEventListener("input", () => {
                isSeeking = true;
                const dur = p.duration || 0;
                p.currentTime = (pb.value / 100) * dur;
                updatePlayerUI();
            });

            pb.addEventListener("change", () => {
                isSeeking = false;
            });
        }

        function playMovie(movie) {
            const player = document.getElementById("mainPlayer");
            const src = document.getElementById("playerSource");

            queuedMovie = movie;
            isPlayingIntro = true;

            src.src = INTRO_VIDEO_URL;
            player.load();

            document.getElementById("playerModal").classList.add("show");
            showPlayerUI();

            player.play().then(() => {
                updatePlayPauseIcon();
            }).catch(() => {});
        }

        function closePlayerModal() {
            const p = document.getElementById("mainPlayer");
            p.pause();
            p.currentTime = 0;

            isPlayingIntro = false;
            queuedMovie = null;

            document.getElementById("playerModal").classList.remove("show");
        }

        function createCard(movie) {
            const div = document.createElement("div");
            div.className = "flex-shrink-0 w-44 md:w-52 cursor-pointer video-thumbnail rounded-xl";

            const ratingInfo = ratingsCache[movie.id] || { avg: "0.0" };

            div.innerHTML = `
                <div class="relative h-64 rounded-xl overflow-hidden bg-gray-800">
                    <img class="w-full h-full object-cover" src="${movie.thumbnail_url}" alt="${movie.title}">
                    <div class="play-overlay">
                        <div class="w-12 h-12 gradient-bg rounded-full flex items-center justify-center">
                            <i class="fas fa-play text-white text-xl"></i>
                        </div>
                    </div>
                    <div class="absolute top-2 right-2 bg-black/60 px-2 py-0.5 rounded-full text-xs">★ ${ratingInfo.avg}</div>
                </div>
                <div class="mt-2">
                    <h4 class="font-semibold truncate">${movie.title}</h4>
                    <p class="text-xs text-gray-400">${movie.genre || 'Movie'} ${movie.release_year || ''}</p>
                </div>
            `;

            div.addEventListener("click", () => {
                setCurrentMovie(movie);
                document.getElementById("detailsModal").classList.add("show");
            });

            return div;
        }

        function renderAllRows() {
            const watchlistIds = new Set(getWatchlist().map(w => w.id));
            const mylist = allMovies.filter(m => watchlistIds.has(m.id)).slice(0, 10);
            const trending = [...allMovies].sort((a, b) => (b.views || 0) - (a.views || 0)).slice(0, 10);
            const topRated = [...allMovies].sort((a, b) => parseFloat(ratingsCache[b.id]?.avg || 0) - parseFloat(ratingsCache[a.id]?.avg || 0)).slice(0, 10);

            document.getElementById("mylistRow").innerHTML = "";
            document.getElementById("trendingRow").innerHTML = "";
            document.getElementById("topRatedRow").innerHTML = "";

            mylist.forEach(m => document.getElementById("mylistRow").appendChild(createCard(m)));
            trending.forEach(m => document.getElementById("trendingRow").appendChild(createCard(m)));
            topRated.forEach(m => document.getElementById("topRatedRow").appendChild(createCard(m)));
        }

        function buildGenreFilters() {
            const bar = document.getElementById("genreFilterBar");
            const genres = [...new Set(allMovies.map(m => (m.genre || "").trim()).filter(Boolean))];

            bar.innerHTML = `<button class="filter-chip active" data-genre="all">All</button>`;

            genres.forEach(g => {
                const btn = document.createElement("button");
                btn.className = "filter-chip";
                btn.innerText = g;
                btn.dataset.genre = g;
                btn.addEventListener("click", () => {
                    selectedGenreFilter = g;
                    document.querySelectorAll("#genreFilterBar .filter-chip").forEach(b => b.classList.toggle("active", b.dataset.genre === g));
                    viewAllPage = 1;
                    renderViewAll();
                });
                bar.appendChild(btn);
            });

            const allBtn = bar.querySelector('[data-genre="all"]');
            if (allBtn) {
                allBtn.addEventListener("click", () => {
                    selectedGenreFilter = "all";
                    document.querySelectorAll("#genreFilterBar .filter-chip").forEach(b => b.classList.toggle("active", b.dataset.genre === "all"));
                    viewAllPage = 1;
                    renderViewAll();
                });
            }
        }

        function getViewAllItems() {
            if (currentViewCat === "movies") return [...allMovies];
            if (currentViewCat === "mylist") {
                const ids = new Set(getWatchlist().map(w => w.id));
                return allMovies.filter(m => ids.has(m.id));
            }
            if (currentViewCat === "trending") return [...allMovies].sort((a, b) => (b.views || 0) - (a.views || 0));
            if (currentViewCat === "toprated") return [...allMovies].sort((a, b) => parseFloat(ratingsCache[b.id]?.avg || 0) - parseFloat(ratingsCache[a.id]?.avg || 0));
            return allMovies;
        }

        function renderViewAll() {
            let items = getViewAllItems();
            const search = document.getElementById("viewAllSearch").value.toLowerCase();

            if (selectedGenreFilter !== "all") {
                items = items.filter(m => (m.genre || "").toLowerCase() === selectedGenreFilter.toLowerCase());
            }

            if (search) {
                items = items.filter(m =>
                    (m.title || "").toLowerCase().includes(search) ||
                    (m.genre || "").toLowerCase().includes(search) ||
                    (m.uploader_name || "").toLowerCase().includes(search)
                );
            }

            const paginated = items.slice(0, viewAllPage * PAGE_SIZE);
            const grid = document.getElementById("viewAllGrid");
            grid.innerHTML = "";
            paginated.forEach(m => grid.appendChild(createCard(m)));

            document.getElementById("loadMoreBtn").style.display = viewAllPage * PAGE_SIZE >= items.length ? "none" : "inline-block";
        }

        function openViewAll(cat) {
            currentViewCat = cat;
            viewAllPage = 1;
            selectedGenreFilter = "all";

            document.getElementById("viewAllTitle").innerText = {
                movies: "All Movies",
                mylist: "My List",
                trending: "Trending Now",
                toprated: "Top Rated"
            }[cat];

            document.getElementById("viewAllSearch").value = "";
            buildGenreFilters();
            renderViewAll();
            document.getElementById("viewAllModal").classList.add("show");
        }

        function checkAuth() {
            const userStr = localStorage.getItem("mtprime_user");
            if (!userStr) {
                window.location.href = "index.html";
                return;
            }

            currentUser = JSON.parse(userStr);

            const name = currentUser.name || currentUser.displayName || "User";
            const email = currentUser.email || "";

            document.getElementById("profileInitial").innerText = name[0].toUpperCase();
            document.getElementById("userName").innerText = name;
            document.getElementById("userEmailMini").innerText = email;
            document.getElementById("dropdownUserName").innerText = name;
            document.getElementById("dropdownUserEmail").innerText = email;
            document.getElementById("mobileProfileInitial").innerText = name[0].toUpperCase();
            document.getElementById("mobileUserName").innerText = name;
            document.getElementById("mobileUserEmail").innerText = email;

            loadMovies().catch(console.error);
        }

        function logout() {
            localStorage.clear();
            window.location.href = "index.html";
        }

        document.getElementById("profileBtn")?.addEventListener("click", () => document.getElementById("profileDropdown").classList.toggle("hidden"));
        document.getElementById("logoutBtn")?.addEventListener("click", logout);
        document.getElementById("mobileLogoutBtn")?.addEventListener("click", logout);

        document.getElementById("heroPlayBtn")?.addEventListener("click", () => {
            if (currentMovie) playMovie(currentMovie);
        });

        document.getElementById("heroDetailsBtn")?.addEventListener("click", () => {
            if (currentMovie) {
                setCurrentMovie(currentMovie);
                document.getElementById("detailsModal").classList.add("show");
            }
        });

        document.getElementById("detailPlayBtn")?.addEventListener("click", () => {
            if (currentMovie) {
                document.getElementById("detailsModal").classList.remove("show");
                playMovie(currentMovie);
            }
        });

        document.getElementById("detailAddToListBtn")?.addEventListener("click", () => {
            if (currentMovie) toggleWatchlist(currentMovie);
        });

        document.getElementById("closeDetailModal")?.addEventListener("click", () => document.getElementById("detailsModal").classList.remove("show"));

        document.getElementById("closePlayer")?.addEventListener("click", closePlayerModal);
        document.getElementById("playPauseBtn")?.addEventListener("click", togglePlayPause);
        document.getElementById("centerPlayBtn")?.addEventListener("click", togglePlayPause);
        document.getElementById("muteBtn")?.addEventListener("click", toggleMute);

        document.getElementById("backwardBtn")?.addEventListener("click", () => {
            if (isPlayingIntro) return;
            seekBy(-10);
        });

        document.getElementById("forwardBtn")?.addEventListener("click", () => {
            if (isPlayingIntro) return;
            seekBy(10);
        });

        document.getElementById("fullscreenBtn")?.addEventListener("click", toggleFullscreen);

        document.querySelectorAll(".nav-show-viewall").forEach(btn => btn.addEventListener("click", () => {
            openViewAll(btn.dataset.category);
            if (!document.getElementById("mobileMenu").classList.contains("translate-x-full")) {
                document.getElementById("mobileMenu").classList.add("translate-x-full");
                document.getElementById("mobileBackdrop").classList.add("hidden");
            }
        }));

        document.getElementById("closeViewAll")?.addEventListener("click", () => document.getElementById("viewAllModal").classList.remove("show"));
        document.getElementById("viewAllSearch")?.addEventListener("input", () => {
            viewAllPage = 1;
            renderViewAll();
        });

        document.getElementById("loadMoreBtn")?.addEventListener("click", () => {
            viewAllPage++;
            renderViewAll();
        });

        document.getElementById("searchToggle")?.addEventListener("click", () => {
            document.getElementById("searchOverlay").classList.remove("hidden");
        });

        document.getElementById("closeSearch")?.addEventListener("click", () => {
            document.getElementById("searchOverlay").classList.add("hidden");
        });

        document.getElementById("searchInput")?.addEventListener("input", (e) => {
            const q = e.target.value.toLowerCase().trim();
            const res = allMovies.filter(m =>
                (m.title || "").toLowerCase().includes(q) ||
                (m.genre || "").toLowerCase().includes(q) ||
                (m.uploader_name || "").toLowerCase().includes(q)
            );

            document.getElementById("searchResults").innerHTML = res.map(m => `
                <div class="search-result bg-gray-800/70 p-3 rounded-xl cursor-pointer hover:bg-gray-700 transition">
                    <div class="font-semibold">${m.title}</div>
                    <div class="text-sm text-gray-400">${m.genre} • ${m.release_year} • ${m.uploader_name || "Unknown"}</div>
                </div>
            `).join("");

            document.querySelectorAll(".search-result").forEach((el, idx) => {
                el.addEventListener("click", () => {
                    setCurrentMovie(res[idx]);
                    document.getElementById("searchOverlay").classList.add("hidden");
                    document.getElementById("detailsModal").classList.add("show");
                });
            });
        });

        const menuToggle = document.getElementById("menuToggle");
        const mobileMenu = document.getElementById("mobileMenu");
        const backdrop = document.getElementById("mobileBackdrop");

        menuToggle?.addEventListener("click", () => {
            mobileMenu.classList.toggle("translate-x-full");
            backdrop.classList.toggle("hidden");
        });

        document.getElementById("closeMobileBtn")?.addEventListener("click", () => {
            mobileMenu.classList.add("translate-x-full");
            backdrop.classList.add("hidden");
        });

        backdrop?.addEventListener("click", () => {
            mobileMenu.classList.add("translate-x-full");
            backdrop.classList.add("hidden");
        });

        window.addEventListener("click", (e) => {
            if (e.target === document.getElementById("detailsModal")) document.getElementById("detailsModal").classList.remove("show");
            if (e.target === document.getElementById("playerModal")) closePlayerModal();
            if (e.target === document.getElementById("viewAllModal")) document.getElementById("viewAllModal").classList.remove("show");
        });

        document.addEventListener("keydown", (e) => {
            const open = document.getElementById("playerModal").classList.contains("show");
            if (!open) return;

            if (e.code === "Space") {
                e.preventDefault();
                togglePlayPause();
            } else if (e.code === "ArrowRight") {
                if (!isPlayingIntro) seekBy(10);
            } else if (e.code === "ArrowLeft") {
                if (!isPlayingIntro) seekBy(-10);
            } else if (e.code === "KeyM") {
                toggleMute();
            } else if (e.code === "Escape") {
                closePlayerModal();
            }
        });

        attachPlayerEvents();
        checkAuth();
    </script>
</body>
</html>
